name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ruff and mypy
        run: pip install ruff mypy types-PyMySQL sqlalchemy alembic pytest rich typer

      - name: Lint (ruff)
        run: ruff check pytest_mrt/

      - name: Format check (ruff)
        run: ruff format --check pytest_mrt/

      - name: Type check (mypy)
        run: mypy pytest_mrt/ --ignore-missing-imports --no-strict-optional

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]" coverage

      - name: Run tests
        run: coverage run -m pytest tests/ -v --ignore=tests/test_postgres.py

      - name: Generate coverage report
        run: coverage xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.13'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false

  test-postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mrt
          POSTGRES_PASSWORD: mrt
          POSTGRES_DB: mrt_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install
        run: pip install -e ".[dev,postgres]" coverage

      - name: Run PostgreSQL tests
        env:
          TEST_DATABASE_URL: postgresql://mrt:mrt@localhost:5432/mrt_test
        run: coverage run -m pytest tests/test_postgres.py -v
