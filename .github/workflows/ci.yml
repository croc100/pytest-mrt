name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src:      ${{ steps.filter.outputs.src }}
      django:   ${{ steps.filter.outputs.django }}
      postgres: ${{ steps.filter.outputs.postgres }}
      mysql:    ${{ steps.filter.outputs.mysql }}
      oracle:   ${{ steps.filter.outputs.oracle }}
      mssql:    ${{ steps.filter.outputs.mssql }}
      ci:       ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'pytest_mrt/**'
              - 'pyproject.toml'
            django:
              - 'pytest_mrt/adapters/django*.py'
              - 'tests/test_django*.py'
            postgres:
              - 'tests/test_postgres.py'
            mysql:
              - 'tests/test_mysql.py'
            oracle:
              - 'tests/test_oracle.py'
            mssql:
              - 'tests/test_mssql.py'
            ci:
              - '.github/workflows/ci.yml'

  lint:
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ruff and mypy
        run: pip install ruff mypy types-PyMySQL sqlalchemy alembic pytest rich typer

      - name: Lint (ruff)
        run: ruff check pytest_mrt/

      - name: Format check (ruff)
        run: ruff format --check pytest_mrt/

      - name: Type check (mypy)
        run: mypy pytest_mrt/ --ignore-missing-imports --no-strict-optional

  test:
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests
        run: coverage run -m pytest tests/ -v --ignore=tests/test_postgres.py --ignore=tests/test_mysql.py --ignore=tests/test_oracle.py --ignore=tests/test_mssql.py && coverage xml

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        if: matrix.python-version == '3.13'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false

  test-postgres:
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || needs.changes.outputs.postgres == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mrt
          POSTGRES_PASSWORD: mrt
          POSTGRES_DB: mrt_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install
        run: pip install -e ".[dev,postgres]" coverage

      - name: Run PostgreSQL tests
        env:
          TEST_DATABASE_URL: postgresql://mrt:mrt@localhost:5432/mrt_test
        run: coverage run -m pytest tests/test_postgres.py -v

  test-mysql:
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || needs.changes.outputs.mysql == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_USER: mrt
          MYSQL_PASSWORD: mrt
          MYSQL_ROOT_PASSWORD: mrt_root
          MYSQL_DATABASE: mrt_test
        options: >-
          --health-cmd "mysqladmin ping -h localhost -umrt -pmrt"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install
        run: pip install -e ".[dev,mysql]" coverage

      - name: Run MySQL tests
        env:
          TEST_DATABASE_URL: mysql+pymysql://mrt:mrt@localhost:3306/mrt_test
        run: coverage run -m pytest tests/test_mysql.py -v

  test-django:
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || needs.changes.outputs.django == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        django-version: ["4.2", "5.0", "5.1"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install
        run: pip install -e ".[dev,django]" "django~=${{ matrix.django-version }}"

      - name: Run Django dynamic rollback tests
        run: pytest tests/test_django_dynamic.py -v

  test-oracle:
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || needs.changes.outputs.oracle == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest

    services:
      oracle:
        image: gvenzl/oracle-free:23-slim
        env:
          ORACLE_PASSWORD: mrt_root
          APP_USER: mrt
          APP_USER_PASSWORD: mrt
        options: >-
          --health-cmd "healthcheck.sh"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 10
        ports:
          - 1521:1521

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install
        run: pip install -e ".[dev,oracle]" coverage

      - name: Run Oracle tests
        env:
          TEST_DATABASE_URL: oracle+oracledb://mrt:mrt@localhost:1521/?service_name=FREEPDB1
        run: coverage run -m pytest tests/test_oracle.py -v

  # Always-green wrapper — the only job registered as a required status check.
  # Succeeds when all conditional jobs either passed or were skipped (docs-only
  # PRs skip everything, but this job still reports green so the PR can merge).
  ci:
    needs: [lint, test, test-django, test-postgres, test-mysql, test-oracle, test-mssql]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed or were skipped
        run: |
          results='${{ toJSON(needs.*.result) }}'
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All jobs passed or were skipped."

  test-mssql:
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || needs.changes.outputs.mssql == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: MrtTest1234!
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'MrtTest1234!' -Q 'SELECT 1' -No"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 1433:1433

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Configure FreeTDS (trust self-signed TLS cert)
        run: |
          printf '[global]\ntds version = 7.4\nencrypt = no\n' >> ~/.freetds.conf

      - name: Create mrt_test database
        run: |
          pip install pymssql
          python -c "
          import pymssql, time, sys
          for attempt in range(20):
              try:
                  conn = pymssql.connect(server='localhost', user='SA', password='MrtTest1234!', database='master', port=1433, autocommit=True)
                  conn.cursor().execute('CREATE DATABASE mrt_test')
                  conn.close()
                  print('Created mrt_test')
                  break
              except Exception as e:
                  print(f'Attempt {attempt+1}: {e}')
                  time.sleep(3)
          else:
              sys.exit(1)
          "

      - name: Install
        run: pip install -e ".[dev,mssql]" coverage

      - name: Run SQL Server tests
        env:
          TEST_DATABASE_URL: mssql+pymssql://SA:MrtTest1234!@localhost:1433/mrt_test
        run: coverage run -m pytest tests/test_mssql.py -v
