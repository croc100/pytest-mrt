name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ruff and mypy
        run: pip install ruff mypy types-PyMySQL sqlalchemy alembic pytest rich typer

      - name: Lint (ruff)
        run: ruff check pytest_mrt/

      - name: Format check (ruff)
        run: ruff format --check pytest_mrt/

      - name: Type check (mypy)
        run: mypy pytest_mrt/ --ignore-missing-imports --no-strict-optional

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]" coverage

      - name: Run tests
        run: coverage run -m pytest tests/ -v --ignore=tests/test_postgres.py --ignore=tests/test_mysql.py --ignore=tests/test_oracle.py --ignore=tests/test_mssql.py

      - name: Generate coverage report
        run: coverage xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.13'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false

  test-postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mrt
          POSTGRES_PASSWORD: mrt
          POSTGRES_DB: mrt_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install
        run: pip install -e ".[dev,postgres]" coverage

      - name: Run PostgreSQL tests
        env:
          TEST_DATABASE_URL: postgresql://mrt:mrt@localhost:5432/mrt_test
        run: coverage run -m pytest tests/test_postgres.py -v

  test-mysql:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_USER: mrt
          MYSQL_PASSWORD: mrt
          MYSQL_ROOT_PASSWORD: mrt_root
          MYSQL_DATABASE: mrt_test
        options: >-
          --health-cmd "mysqladmin ping -h localhost -umrt -pmrt"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install
        run: pip install -e ".[dev,mysql]" coverage

      - name: Run MySQL tests
        env:
          TEST_DATABASE_URL: mysql+pymysql://mrt:mrt@localhost:3306/mrt_test
        run: coverage run -m pytest tests/test_mysql.py -v

  test-django:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        django-version: ["4.2", "5.0", "5.1"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install
        run: pip install -e ".[dev,django]" "django~=${{ matrix.django-version }}"

      - name: Run Django dynamic rollback tests
        run: pytest tests/test_django_dynamic.py -v

  test-oracle:
    runs-on: ubuntu-latest

    services:
      oracle:
        image: gvenzl/oracle-free:23-slim
        env:
          ORACLE_PASSWORD: mrt_root
          APP_USER: mrt
          APP_USER_PASSWORD: mrt
        options: >-
          --health-cmd "healthcheck.sh"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 10
        ports:
          - 1521:1521

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install
        run: pip install -e ".[dev,oracle]" coverage

      - name: Run Oracle tests
        env:
          TEST_DATABASE_URL: oracle+oracledb://mrt:mrt@localhost:1521/?service_name=FREEPDB1
        run: coverage run -m pytest tests/test_oracle.py -v

  test-mssql:
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: MrtTest1234!
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'MrtTest1234!' -Q 'SELECT 1' -No"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 1433:1433

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Configure FreeTDS (trust self-signed TLS cert)
        run: |
          printf '[global]\ntds version = 7.4\nencrypt = no\n' >> ~/.freetds.conf

      - name: Create mrt_test database
        run: |
          pip install pymssql
          python -c "
          import pymssql, time, sys
          for attempt in range(20):
              try:
                  conn = pymssql.connect(server='localhost', user='SA', password='MrtTest1234!', database='master', port=1433)
                  conn.cursor().execute('CREATE DATABASE mrt_test')
                  conn.commit()
                  conn.close()
                  print('Created mrt_test')
                  break
              except Exception as e:
                  print(f'Attempt {attempt+1}: {e}')
                  time.sleep(3)
          else:
              sys.exit(1)
          "

      - name: Install
        run: pip install -e ".[dev,mssql]" coverage

      - name: Run SQL Server tests
        env:
          TEST_DATABASE_URL: mssql+pymssql://SA:MrtTest1234!@localhost:1433/mrt_test
        run: coverage run -m pytest tests/test_mssql.py -v
